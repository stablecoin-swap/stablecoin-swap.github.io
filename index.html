<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stablecoin Swap - Decentralized DeFi Portal</title>
  <meta name="description" content="Secure, non-custodial portal for Stablecoin Swap DeFi operations directly from your own wallet.">
  <link rel="canonical" href="https://stablecoin-swap.github.io/">
  <meta name="robots" content="index,follow">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="manifest" href="site.webmanifest">
  <link rel="prefetch" href="dashboard/">
  <link rel="prerender" href="dashboard/">
  <style>


:root{
  --bg:#070A0D;
  --panel:#0D1216;
  --panel-2:#101820;
  --ink:#F4F8F6;
  --muted:#A8B2AE;
  --faint:#6F7A76;
  --line:rgba(244,248,246,.11);
  --line-strong:rgba(244,248,246,.18);
  --accent:#1FA463;
  --accent-dark:#16814E;
  --accent-soft:rgba(31,164,99,.18);
  --shadow:0 30px 90px -45px rgba(0,0,0,.82);
}

*{box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  margin:0;
  min-height:100dvh;
  color:var(--ink);
  background:
    radial-gradient(circle at 50% -16%, rgba(31,164,99,.20), transparent 38%),
    linear-gradient(180deg, #0A0F12 0%, var(--bg) 58%, #050708 100%);
  font-family:Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  display:flex;
  flex-direction:column;
}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
p,h1{margin:0}

.topbar{
  height:72px;
  display:flex;
  align-items:center;
  gap:18px;
  padding:16px clamp(18px,4vw,44px);
  flex:0 0 auto;
}
.brand{
  display:inline-flex;
  align-items:center;
  gap:10px;
  min-width:0;
  font-size:1.02rem;
  font-weight:750;
  white-space:nowrap;
}
.brand img{
  width:30px;
  height:30px;
  border-radius:50%;
  box-shadow:0 0 0 1px var(--line-strong);
}
.nav{
  display:flex;
  align-items:center;
  gap:24px;
  margin-left:8px;
}
.nav a{
  color:var(--muted);
  font-size:.9rem;
  font-weight:560;
  transition:color .16s ease;
}
.nav a:hover{color:var(--ink)}
.spacer{flex:1}
.ghost{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:38px;
  padding:8px 17px;
  color:var(--ink);
  border:1px solid var(--line-strong);
  border-radius:999px;
  background:rgba(255,255,255,.035);
  font-size:.9rem;
  font-weight:700;
  white-space:nowrap;
  transition:background .16s ease, border-color .16s ease, transform .16s ease;
}
.ghost:hover{
  background:rgba(31,164,99,.12);
  border-color:rgba(31,164,99,.38);
  transform:translateY(-1px);
}

.stage{
  flex:1 1 auto;
  min-height:0;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:28px;
  padding:8px 20px 12px;
  text-align:center;
}
.hero{
  display:flex;
  flex-direction:column;
  align-items:center;
}
h1{
  font-size:clamp(3rem,7vw,5.45rem);
  line-height:.98;
  letter-spacing:0;
  font-weight:820;
}
.sub{
  max-width:620px;
  margin-top:17px;
  color:var(--muted);
  font-size:clamp(1rem,1.55vw,1.18rem);
}
.sub strong{
  color:var(--ink);
  font-weight:760;
  box-shadow:inset 0 -.46em 0 var(--accent-soft);
}

.swap-card{
  width:min(590px,100%);
  padding:18px;
  background:linear-gradient(180deg, rgba(255,255,255,.055), rgba(255,255,255,.025)), var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:var(--shadow);
}
.route{
  display:grid;
  grid-template-columns:minmax(0,1fr) 44px minmax(0,1fr);
  align-items:center;
  gap:12px;
}
.leg{
  min-width:0;
  padding:15px;
  text-align:left;
  background:var(--panel-2);
  border:1px solid var(--line);
  border-radius:14px;
}
.label{
  display:block;
  color:var(--faint);
  font-size:.69rem;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}
.chip{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:9px;
}
.token{
  width:30px;
  height:30px;
  border-radius:50%;
  flex:0 0 auto;
  box-shadow:0 0 0 1px rgba(255,255,255,.18);
}
.ticker{
  color:var(--ink);
  font-size:1.13rem;
  font-weight:820;
}
.switch{
  width:44px;
  height:44px;
  border:1px solid var(--line-strong);
  border-radius:50%;
  background:#0A0E11;
  color:var(--muted);
  display:grid;
  place-items:center;
  cursor:pointer;
  transition:color .16s ease, border-color .16s ease, background .16s ease, transform .16s ease;
}
.switch span{
  display:block;
  font-size:1rem;
  line-height:1;
}
.switch:hover{
  color:#fff;
  border-color:rgba(31,164,99,.48);
  background:var(--accent-soft);
  transform:translateY(-1px);
}
.enter{
  display:flex;
  align-items:center;
  justify-content:center;
  min-height:54px;
  width:100%;
  margin-top:14px;
  border-radius:14px;
  background:var(--accent);
  color:#fff;
  font-size:1.02rem;
  font-weight:820;
  transition:background .16s ease, transform .16s ease;
}
.enter:hover{
  background:var(--accent-dark);
  transform:translateY(-1px);
}
.note{
  margin-top:10px;
  color:var(--faint);
  font-size:.78rem;
  font-weight:650;
}
.foot{
  flex:0 0 auto;
  padding:14px 20px 22px;
  color:var(--faint);
  text-align:center;
  font-size:.84rem;
  font-weight:650;
}

@media(max-width:720px){
  .nav{display:none}
}

@media(max-width:520px){
  .topbar{
    height:66px;
    padding:14px 15px;
    gap:10px;
  }
  .brand{
    font-size:.94rem;
    gap:8px;
  }
  .brand img{
    width:28px;
    height:28px;
  }
  .ghost{
    min-height:36px;
    padding:7px 12px;
    font-size:.84rem;
  }
  .stage{
    gap:20px;
    padding:2px 14px 8px;
  }
  h1{
    font-size:clamp(2.4rem,14vw,3.25rem);
    line-height:1;
  }
  .sub{
    margin-top:12px;
    max-width:34ch;
    font-size:.96rem;
    line-height:1.45;
  }
  .swap-card{
    padding:14px;
    border-radius:16px;
  }
  .route{
    grid-template-columns:1fr;
    gap:10px;
  }
  .leg{
    padding:13px 14px;
  }
  .switch{
    justify-self:center;
    width:38px;
    height:38px;
  }
  .switch span{
    transform:rotate(90deg);
  }
  .enter{
    min-height:50px;
    margin-top:12px;
  }
  .note{
    margin-top:8px;
  }
  .foot{
    padding:10px 16px 16px;
    font-size:.78rem;
  }
}

@media(max-height:700px){
  .topbar{height:62px;padding-top:12px;padding-bottom:12px}
  .stage{gap:18px;padding-top:0;padding-bottom:4px}
  h1{font-size:clamp(2.55rem,6vw,4.4rem)}
  .sub{margin-top:10px;font-size:1rem}
  .swap-card{padding:14px}
  .enter{min-height:48px}
  .foot{padding-top:8px;padding-bottom:12px}
}


  
.footer {
  text-align: center !important;
}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <img src="favicon.png" width="30" height="30" alt="">
      <span>Stablecoin Swap</span>
    </div>
    <span class="spacer"></span>
    <nav class="nav" aria-label="Main Navigation">
      <a href="how-it-works/">How it works</a>
      <a href="faq/">FAQ</a>
      <a href="about/">About</a>
      <a href="security/">Security</a>
      <a href="supported-chains/">Supported Chains</a>
    </nav>
  </header>
  <main class="stage" style="padding: 100px 24px; text-align: center; max-width: 800px; margin: 0 auto;">
    <h1 style="font-size: clamp(2.5rem, 6vw, 4.5rem); margin-bottom: 24px; font-weight: 800;">Stablecoin Swap</h1>
    <p class="value" style="font-size: 1.25rem; opacity: 0.8; margin-bottom: 40px; line-height: 1.6;">Secure, non-custodial gateway for decentralized operations. Connect your Web3 wallet to enter the portal.</p>
    <a class="open-app" href="dashboard/" style="display: inline-flex; justify-content: center; align-items: center; min-height: 52px; padding: 0 32px; border-radius: 9999px; background: var(--accent, #625bf3); color: #fff; font-weight: 700; text-decoration: none; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.15); transition: transform 0.2s ease;">Open App Dashboard</a>
  </main>
  <footer class="footer">Stablecoin Swap &mdash; 2026</footer>
</body>
</html>
